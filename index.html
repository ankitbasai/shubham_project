<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">  <!-- 🔥 IMPORTANT FIX -->
    <title>Love Page</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            margin-top: 50px;
            font-family: Arial;
        }

        h1 {
            font-size: 70px;
        }

        .heart {
            color: red;
            font-size: 90px;
            animation: blink 1s infinite;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .photo {
            width: 250px;
            height: 300px;
            border-radius: 20px;
            border: 3px solid white;
            object-fit: cover;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0.3;}
            100% {opacity: 1;}
        }
    </style>
</head>
<body>

    <h1>
        Ankit <span class="heart">❤️</span> Shubham
    </h1>

    <div class="container">
        <img src="photo1.jpg" class="photo">
        <img src="photo2.jpg" class="photo">
    </div>

</body>
</html>
