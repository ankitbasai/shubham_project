<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Love Page</title>

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 40px;
        }

        h1 {
            font-size: 70px;
        }

        .heart {
            color: red;
            font-size: 90px;
            animation: beat 1s infinite;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
        }

        .photo {
            width: 260px;
            height: 320px;
            border-radius: 20px;
            border: 4px solid white;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .photo:hover {
            transform: scale(1.1);
        }

        @keyframes beat {
            0% {transform: scale(1);}
            50% {transform: scale(1.2);}
            100% {transform: scale(1);}
        }
    </style>
</head>

<body>

    <h1>
        Ankit <span class="heart">❤️</span> Shubham
    </h1>

    <div class="container">
        <img src="1.jpg" class="photo">
        <img src="2.jpg" class="photo">
    </div>

</body>
</html>
