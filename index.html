<!DOCTYPE html>
<html>
<head>
    <title>Love Page</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
        }

        h1 {
            font-size: 80px;
        }

        .heart {
            color: red;
            font-size: 100px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0.3;}
            100% {opacity: 1;}
        }
    </style>
</head>
<body>

    <h1>
        Ankit <span class="heart">❤️</span> Shubham
    </h1>

</body>
</html>
