<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit ❤️ Shubham Slideshow</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .header {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .heart {
            color: #ff4d6d;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Slideshow Container */
        .slideshow-container {
            width: 300px;
            height: 400px;
            border: 3px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            position: relative; /* Image positioning ke liye */
        }

        /* Image styling */
        .mySlides {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute; /* Images ek ke upar ek rahengi */
            top: 0;
            left: 0;
            opacity: 0; /* Shuru mein sari images hidden hongi */
            transition: opacity 1s ease-in-out; /* Fade effect ke liye */
        }

        /* Jo image active hai usse dikhana */
        .mySlides.fade-in {
            opacity: 1;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .header { font-size: 2rem; }
            .slideshow-container { width: 250px; height: 330px; }
        }
    </style>
</head>
<body>

    <div class="header">
        Ankit <span class="heart">❤️</span> Shubham
    </div>

    <div class="slideshow-container">
        <img class="mySlides" src="ankit.jpg" alt="Ankit Photo">
        <img class="mySlides" src="shubham.jpg" alt="Shubham Photo">
    </div>

    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("mySlides");

        function showSlides() {
            // Sari images se fade-in class hatana
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("fade-in");
            }

            // Agli image set karna
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1; // Wapas pehli photo pe aana
            }

            // Current image pe fade-in class lagana
            slides[slideIndex - 1].classList.add("fade-in");

            // Har 3 second baad agli photo dikhana
            setTimeout(showSlides, 3000); 
        }

        // Slideshow shuru karna
        showSlides();
    </script>

</body>
</html>
