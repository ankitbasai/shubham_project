<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit ❤️ Shubham Special</title>
    <style>
        /* Screen ka poora setup */
        body {
            background-color: #000; /* Black background */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Name aur Heart ka style */
        .header {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .heart {
            color: #ff4d6d;
            display: inline-block;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.25); }
        }

        /* Photo Frame ka style */
        .slideshow-container {
            width: 300px;
            height: 400px;
            border: 4px solid #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.5);
        }

        /* Images ki setting */
        .mySlides {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Photo ko frame mein fit karne ke liye */
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* Smooth badalne ke liye */
        }

        /* Active photo dikhane ke liye */
        .visible {
            opacity: 1;
        }

        /* Chota message niche */
        .footer-text {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #aaa;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        Ankit <span class="heart">❤️</span> Shubham
    </div>

    <div class="slideshow-container">
        <img class="mySlides" src="ankit.jpg" alt="Ankit">
        
        <img class="mySlides" src="shubham.jpg" alt="Shubham">
    </div>

    <div class="footer-text">FOREVER TOGETHER</div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll(".mySlides");

        function startSlideshow() {
            // Pehle sari photos ko chhupao
            slides.forEach(slide => slide.classList.remove("visible"));

            // Agli photo ko dikhao
            currentSlide++;
            if (currentSlide > slides.length) {
                currentSlide = 1;
            }

            slides[currentSlide - 1].classList.add("visible");

            // Har 3 second (3000ms) mein photo badlegi
            setTimeout(startSlideshow, 3000);
        }

        // Slideshow shuru karein
        window.onload = startSlideshow;
    </script>

</body>
</html>
