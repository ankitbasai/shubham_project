<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit Love Shubham</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .header {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .heart {
            color: #ff4d6d;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .photo-frame {
            width: 250px;
            height: 350px;
            border: 3px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Photo ko frame mein sahi se fit karne ke liye */
        }

        /* Mobile ke liye responsive design */
        @media (max-width: 600px) {
            .header { font-size: 2rem; }
            .container { flex-direction: column; }
            .photo-frame { width: 200px; height: 280px; }
        }
    </style>
</head>
<body>

    <div class="header">
        Ankit <span class="heart">❤️</span> Shubham
    </div>

    <div class="container">
        <div class="photo-frame">
            <img src="ankit.jpg" alt="Ankit Photo">
        </div>

        <div class="photo-frame">
            <img src="shubham.jpg" alt="Shubham Photo">
        </div>
    </div>

</body>
</html>
